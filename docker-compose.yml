version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: minierp_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: minierp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: minierp_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: "postgresql://postgres:postgrespassword@postgres:5432/minierp?schema=public"
      JWT_ACCESS_SECRET: "enterprise_docker_prod_jwt_access_secret_2026"
      JWT_REFRESH_SECRET: "enterprise_docker_prod_jwt_refresh_secret_2026"
      CORS_ORIGIN: "*"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: minierp_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
