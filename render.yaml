services:
  # Backend Web Service on Render
  - type: web
    name: minierp-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run render:build
    startCommand: npm run render:start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: minierp-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "*"


databases:
  # Render Managed PostgreSQL Database Service
  - name: minierp-postgres
    databaseName: minierp
    user: minierp_user
    plan: free
